services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - customer-net

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: customer_db
    command: --max_allowed_packet=64M
    networks:
      - customer-net

  redis:
    image: redis:alpine
    networks:
      - customer-net

networks:
  customer-net:
    driver: bridge